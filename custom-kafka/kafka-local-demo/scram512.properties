F_53B  = "payload-magic-ordersimple-53b.bin"
F_1MB  = "avro-magic-1mb.bin"
F_2MB  = "avro-nomagic-shipment-1999kb.bin"

PLAINTEXT      = ("PLAINTEXT",      None)
SASL_PLAIN     = ("SASL_PLAINTEXT", "PLAIN")
SASL_P_256     = ("SASL_PLAINTEXT", "SCRAM-SHA-256")
SASL_P_512     = ("SASL_PLAINTEXT", "SCRAM-SHA-512")
SASL_SSL_PLAIN = ("SASL_SSL",       "PLAIN")
SASL_SSL_256   = ("SASL_SSL",       "SCRAM-SHA-256")
SASL_SSL_512   = ("SASL_SSL",       "SCRAM-SHA-512")


@dataclass(frozen=True)
class TopicSpec:
    topic: str
    payload_file: str
    port: int
    protocol: str
    mechanism: Optional[str]


@dataclass
class TopicStats:
    target: int = 0
    enqueued: int = 0
    ok: int = 0
    fail: int = 0
    bytes_ok: int = 0
    last_err: Optional[str] = None


class GlobalStats:
    def __init__(self) -> None:
        self.target = 0
        self.enqueued = 0
        self.ok = 0
        self.fail = 0
        self.bytes_ok = 0


class RateLimiter:
    def __init__(self, max_mps: int, max_mbps: float) -> None:
        self.max_mps = max_mps
        self.max_bytes_per_sec = int(max_mbps * 1024 * 1024) if max_mbps > 0 else 0
        self.window_start = time.monotonic()
        self.window_msgs = 0
        self.window_bytes = 0

    def wait(self, payload_len: int) -> None:
        if self.max_mps <= 0 and self.max_bytes_per_sec <= 0:
            return

        while True:
            now = time.monotonic()
            elapsed = now - self.window_start

            if elapsed >= 1.0:
                self.window_start = now
                self.window_msgs = 0
                self.window_bytes = 0
                return

            msg_limited = self.max_mps > 0 and self.window_msgs >= self.max_mps
            byte_limited = self.max_bytes_per_sec > 0 and (self.window_bytes + payload_len) > self.max_bytes_per_sec

            if not msg_limited and not byte_limited:
                return

            time.sleep(min(0.05, max(0.001, 1.0 - elapsed)))

    def account(self, payload_len: int) -> None:
        self.window_msgs += 1
        self.window_bytes += payload_len


TESTS: List[TopicSpec] = [
    TopicSpec("id00.acme.sales.otc.orders.created.n.s",               F_53B, 19101, *PLAINTEXT),
