#!/usr/bin/env python3
"""
EventSmartKafka — Conservative 800k Stress Validation

Default plan:
- 800,000 total messages
- 100 total messages with 1 MB payload
- 100 total messages with 2 MB payload
- 799,800 small messages

This avoids hammering a SAP CPI Trial tenant with unnecessary GBs of payload.
Use the x10 smoke script first.

Run from:
    kafka-local-demo\tests\smoke or tests\stress

Requires:
    pip install confluent-kafka

Examples:
    python 06-stress-800k-conservative.py --dry-run
    python 06-stress-800k-conservative.py
    python 06-stress-800k-conservative.py --max-mps 500 --max-mbps 8
"""

import argparse
import os
import sys
import time
import uuid
from dataclasses import dataclass
from typing import Dict, List, Optional, Tuple
from confluent_kafka import Producer


USER = "sdia"
PWD  = "SDIABRASIL"
