]


def parse_args() -> argparse.Namespace:
    parser = argparse.ArgumentParser(description="EventSmartKafka conservative 800k stress producer")
    parser.add_argument("--total", type=int, default=800_000,
                        help="Total messages across all topics. Default: 800000")
    parser.add_argument("--big1-total", type=int, default=100,
                        help="TOTAL 1 MB messages across all 1 MB topics. Default: 100")
    parser.add_argument("--big2-total", type=int, default=100,
                        help="TOTAL 2 MB messages across all 2 MB topics. Default: 100")
    parser.add_argument("--max-mps", type=int, default=1000,
                        help="Max enqueue messages/sec. 0 = unlimited. Default: 1000")
    parser.add_argument("--max-mbps", type=float, default=10.0,
                        help="Max enqueue MiB/sec. 0 = unlimited. Default: 10")
    parser.add_argument("--progress-sec", type=float, default=5.0,
                        help="Progress print interval in seconds. Default: 5")
    parser.add_argument("--dry-run", action="store_true",
                        help="Print plan and exit without sending")
    return parser.parse_args()


def load_payload(fname: str) -> bytes:
    path = os.path.join(BINS, fname)
    with open(path, "rb") as f:
        return f.read()


def make_producer(port: int, protocol: str, mechanism: Optional[str]) -> Producer:
    cfg = {
        "bootstrap.servers": f"{HOST}:{port}",
        "acks": "1",
        "message.max.bytes": 5_000_000,
        "socket.timeout.ms": 30_000,
        "request.timeout.ms": 30_000,
        "message.timeout.ms": 300_000,
        "linger.ms": 5,
        "batch.num.messages": 10_000,
        "queue.buffering.max.messages": 200_000,
        "queue.buffering.max.kbytes": 524_288,
        "compression.type": "none",
    }

    if protocol == "PLAINTEXT":
        cfg["security.protocol"] = "PLAINTEXT"
    elif protocol == "SASL_PLAINTEXT":
        cfg.update({
            "security.protocol": "SASL_PLAINTEXT",
            "sasl.mechanism": mechanism,
            "sasl.username": USER,
            "sasl.password": PWD,
        })
    elif protocol == "SASL_SSL":
        cfg.update({
            "security.protocol": "SASL_SSL",
            "sasl.mechanism": mechanism,
            "sasl.username": USER,
            "sasl.password": PWD,
            "ssl.ca.location": CERT,
            "ssl.endpoint.identification.algorithm": "none",
        })
    else:
        raise ValueError(f"Unsupported protocol: {protocol}")

    return Producer(cfg)


def distribute(total: int, specs: List[TopicSpec]) -> Dict[str, int]:
    base = total // len(specs)
    rem = total % len(specs)
    return {spec.topic: base + (1 if i < rem else 0) for i, spec in enumerate(specs)}


def build_plan(args: argparse.Namespace) -> Dict[str, int]:
    small_specs = [s for s in TESTS if s.payload_file == F_53B]
    one_specs = [s for s in TESTS if s.payload_file == F_1MB]
    two_specs = [s for s in TESTS if s.payload_file == F_2MB]

    small_total = args.total - args.big1_total - args.big2_total
    if small_total < 0:
        raise ValueError("--total must be >= --big1-total + --big2-total")

    plan = {}
    plan.update(distribute(small_total, small_specs))
    plan.update(distribute(args.big1_total, one_specs))
    plan.update(distribute(args.big2_total, two_specs))
    return plan


def fmt_duration(seconds: float) -> str:
    if seconds <= 0 or seconds == float("inf"):
        return "--:--:--"
    seconds = int(seconds)
    h, rem = divmod(seconds, 3600)
    m, s = divmod(rem, 60)
    return f"{h:02d}:{m:02d}:{s:02d}"


def print_plan(plan: Dict[str, int], payloads: Dict[str, bytes]) -> None:
    total_msgs = sum(plan.values())
    total_bytes = sum(plan[spec.topic] * len(payloads[spec.payload_file]) for spec in TESTS)
    by_file = {F_53B: 0, F_1MB: 0, F_2MB: 0}
    for spec in TESTS:
        by_file[spec.payload_file] += plan[spec.topic]

    print("EventSmartKafka — Conservative 800k Stress Validation\n")
    print("Workload plan")
    print(f"  Total messages : {total_msgs:,}")
    print(f"  Small payload  : {by_file[F_53B]:,}x × {len(payloads[F_53B]):,} B")
    print(f"  1 MB payload   : {by_file[F_1MB]:,}x × {len(payloads[F_1MB]):,} B")
    print(f"  2 MB payload   : {by_file[F_2MB]:,}x × {len(payloads[F_2MB]):,} B")
    print(f"  Total bytes    : {total_bytes:,} B | {total_bytes / (1024**2):.2f} MiB")
    print()
    print("Per-topic plan")
    for spec in TESTS:
        count = plan[spec.topic]
        label = f"{spec.protocol}/{spec.mechanism or '-'}"
        bytes_total = count * len(payloads[spec.payload_file])
        print(f"  :{spec.port} {label:28} {spec.topic:62} {count:8,}x  {bytes_total / (1024**2):8.2f} MiB")
    print()


def print_progress(prefix: str, stats: GlobalStats, start: float) -> None:
    elapsed = max(0.001, time.monotonic() - start)
    msg_rate = stats.ok / elapsed
    mib_rate = stats.bytes_ok / elapsed / (1024**2)
    remaining = max(0, stats.target - stats.ok - stats.fail)
    eta = remaining / msg_rate if msg_rate > 0 else float("inf")
    inflight = max(0, stats.enqueued - stats.ok - stats.fail)

    print(
        f"{prefix} "
        f"ENQ {stats.enqueued:,}/{stats.target:,} | "
        f"ACK {stats.ok:,} | "
        f"FAIL {stats.fail:,} | "
        f"{msg_rate:,.0f} msg/s | "
        f"{mib_rate:,.2f} MiB/s | "
        f"in-flight {inflight:,} | "
        f"ETA {fmt_duration(eta)}"
    )


def main() -> None:
    args = parse_args()

    if not os.path.isfile(CERT):
        print(f"ERROR: CA cert not found: {CERT}")
        sys.exit(1)

    payloads: Dict[str, bytes] = {}
    for fname in (F_53B, F_1MB, F_2MB):
        path = os.path.join(BINS, fname)
        if not os.path.isfile(path):
            print(f"MISSING PAYLOAD: {path}")
            sys.exit(1)
        payloads[fname] = load_payload(fname)

    plan = build_plan(args)
    print_plan(plan, payloads)

    if args.dry_run:
        print("Dry run only. No messages sent.")
        return

    run_id = str(uuid.uuid4())
    print(f"Run ID       : {run_id}")
    print(f"Max enqueue : {args.max_mps or 'unlimited'} msg/s | {args.max_mbps or 'unlimited'} MiB/s")
    print()

    producers: Dict[Tuple[int, str, Optional[str]], Producer] = {}
    for spec in TESTS:
        key = (spec.port, spec.protocol, spec.mechanism)
        if key not in producers:
            producers[key] = make_producer(*key)

    topic_stats = {spec.topic: TopicStats(target=plan[spec.topic]) for spec in TESTS}
    global_stats = GlobalStats()
    global_stats.target = sum(plan.values())

    limiter = RateLimiter(args.max_mps, args.max_mbps)

    def make_cb(topic: str, payload_len: int):
        def cb(err, msg):
            ts = topic_stats[topic]
            if err:
                ts.fail += 1
                ts.last_err = str(err)
                global_stats.fail += 1
            else:
                ts.ok += 1
                ts.bytes_ok += payload_len
                global_stats.ok += 1
                global_stats.bytes_ok += payload_len
        return cb

    start = time.monotonic()
    last_print = start

    try:
        for spec in TESTS:
            target = plan[spec.topic]
            if target <= 0:
                continue

            payload = payloads[spec.payload_file]
            payload_len = len(payload)
            producer = producers[(spec.port, spec.protocol, spec.mechanism)]
            ts = topic_stats[spec.topic]

            for _ in range(target):
                limiter.wait(payload_len)

                while True:
                    try:
                        producer.produce(spec.topic, value=payload, callback=make_cb(spec.topic, payload_len))
                        break
                    except BufferError:
                        for p in producers.values():
                            p.poll(0)
                        time.sleep(0.01)

                producer.poll(0)
                limiter.account(payload_len)

                ts.enqueued += 1
                global_stats.enqueued += 1

                now = time.monotonic()
                if now - last_print >= args.progress_sec:
                    print_progress("[PRODUCE]", global_stats, start)
                    last_print = now

        print_progress("[FLUSH  ]", global_stats, start)

        while global_stats.ok + global_stats.fail < global_stats.enqueued:
            for p in producers.values():
                p.poll(0.1)

            now = time.monotonic()
            if now - last_print >= args.progress_sec:
                print_progress("[DRAIN  ]", global_stats, start)
                last_print = now

        for p in producers.values():
            p.flush(60)

    except KeyboardInterrupt:
        print("\nInterrupted. Flushing producer callbacks...")
        for p in producers.values():
            p.flush(10)
        raise

    elapsed = max(0.001, time.monotonic() - start)

    print()
    print_progress("[FINAL  ]", global_stats, start)
    print()
    print("Per-topic result")
    for spec in TESTS:
        ts = topic_stats[spec.topic]
        label = f"{spec.protocol}/{spec.mechanism or '-'}"
        status = "OK" if ts.fail == 0 and ts.ok == ts.target else "FAIL"
        print(
            f"  {status:5} :{spec.port} {label:28} {spec.topic:62} "
            f"target={ts.target:8,} ok={ts.ok:8,} fail={ts.fail:4,}"
        )
        if ts.last_err:
            print(f"        last error: {ts.last_err}")

    print()
    print(f"Total elapsed : {fmt_duration(elapsed)}")
    print(f"Total OK      : {global_stats.ok:,}")
    print(f"Total Failed  : {global_stats.fail:,}")
    print(f"Avg msg/s     : {global_stats.ok / elapsed:,.0f}")
    print(f"Avg MiB/s     : {global_stats.bytes_ok / elapsed / (1024**2):,.2f}")

    if global_stats.fail:
        sys.exit(1)


if __name__ == "__main__":
    main()
